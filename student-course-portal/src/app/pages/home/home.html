<div class="home-container">

    <h1>{{ portalName }}</h1>

    <p>
        Welcome to the Student Course Portal.
        Browse courses, manage your profile,
        and enroll in new courses.
    </p>

    <div class="stats">

        <div class="card">
            <h3>Courses Available</h3>
            <p>{{ coursesAvailable }}</p>
        </div>

        <div class="card">
            <h3>Enrolled</h3>
            <p>3</p>
        </div>

        <div class="card">
            <h3>GPA</h3>
            <p>3.8</p>
        </div>

    </div>

    <button
        [disabled]="!isPortalActive"
        (click)="onEnrollClick()">

        Enroll Now

    </button>

    <p class="message">{{ message }}</p>

    <hr>

    <h3>Search Courses</h3>

    <!--
      [property] → One-way binding (Component → DOM)
      [(ngModel)] → Two-way binding (DOM ↔ Component)
    -->

    <input
        type="text"
        placeholder="Search course..."
        [(ngModel)]="searchTerm">

    <p>Searching for: {{ searchTerm }}</p>

</div>
